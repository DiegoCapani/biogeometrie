<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>#03 BIOGEOMETRIE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0ff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="splash">
        <h1>BIOGEOMETRIE</h1>
        <p>[ TOCCA PER INIZIARE LA MAPPATURA ]</p>
    </div>

    <video id="input_video" style="display:none;" playsinline></video>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
        import * as THREE from "https://cdn.skypack.dev/three@0.136.0";

        const splash = document.getElementById('splash');
        let faceLandmarker;

        async function init() {
            splash.style.display = 'none';
            
            // Setup Three.js
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const material = new THREE.LineBasicMaterial({ color: 0x00ffff });
            const mesh = new THREE.LineSegments(geometry, material);
            scene.add(mesh);
            camera.position.z = 2;

            // MediaPipe Setup
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            const video = document.getElementById("input_video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.play();

            function render() {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks.length > 0) {
                    // Creiamo una struttura wireframe semplice
                    const points = [];
                    results.faceLandmarks[0].forEach(l => {
                        points.push(new THREE.Vector3(l.x * 2 - 1, -l.y * 2 + 1, -l.z));
                    });
                    geometry.setFromPoints(points);
                }
                renderer.render(scene, camera);
                requestAnimationFrame(render);
            }
            video.onloadeddata = render;
        }

        splash.addEventListener('click', init);
    </script>
</body>
</html>
