<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BIOGEOMETRIE | STAZIONE 03</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; }
        #status { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 100; font-size: 9px; letter-spacing: 3px; pointer-events: none; text-transform: uppercase; }
        
        #splash { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #000; 
            color: #fff; z-index: 999; text-align: center;
        }
        #startApp { 
            margin-top: 30px; padding: 15px 35px; border: 1px solid #999; 
            background: transparent; color: #fff; cursor: pointer; 
            letter-spacing: 5px; text-transform: uppercase; transition: 0.4s;
        }
        #startApp:hover { border-color: #0ff; color: #0ff; }
        .version-tag { margin-top: 25px; font-size: 0.7em; opacity: 0.5; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="status">STATO: SISTEMA PRONTO</div>
    
    <div id="splash">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">STAZIONE 03 | CORPO=BIT</div>
        <h1 style="letter-spacing: 20px; font-weight: 100; margin-bottom: 5px;">BIOGEOMETRIE</h1>
        <button id="startApp">Tocca per avviare la fotocamera</button>
        <div class="version-tag">By DIEGO CAPANI</div>
    </div>

    <video id="v" style="display:none" playsinline></video>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
        import * as THREE from "https://cdn.skypack.dev/three@0.136.0";

        const log = document.getElementById('status');
        const v = document.getElementById('v');
        const startBtn = document.getElementById('startApp');

        async function init() {
            document.getElementById('splash').style.display = 'none';
            log.innerText = "Caricamento AI...";

            try {
                v.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
                v.play();

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
                camera.position.z = 1;
                const renderer = new THREE.WebGLRenderer({ alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                const geo = new THREE.BufferGeometry();
                const mat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.01 });
                const pts = new THREE.Points(geo, mat);
                scene.add(pts);

                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                const landmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                    runningMode: "VIDEO"
                });

                function loop() {
                    if (v.readyState >= 2) {
                        const res = landmarker.detectForVideo(v, performance.now());
                        if (res.faceLandmarks.length > 0) {
                            const pos = new Float32Array(res.faceLandmarks[0].flatMap(l => [(l.x-0.5)*-2, (l.y-0.5)*-2, l.z]));
                            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                            log.innerText = "STATUS: TRACKING ATTIVO";
                        }
                    }
                    renderer.render(scene, camera);
                    requestAnimationFrame(loop);
                }
                loop();
            } catch(e) {
                log.innerText = "ERRORE: " + e.message;
            }
        }
        
        startBtn.addEventListener('click', init);
    </script>
</body>
</html>
