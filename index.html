<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#03 BIOGEOMETRIE | Stazione 03</title>

    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 2; background: transparent; }
        
        /* UI E SPLASH SCREEN */
        #ui { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 10; padding: 10px; color: #0ff; font-size: 9px; letter-spacing: 3px; pointer-events: none; }

        #splash {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            background: #000; color: white; text-align: center;
        }
        #startApp {
            margin-top: 30px; padding: 15px 35px; border: 1px solid #999;
            background: transparent; color: #fff; cursor: pointer; border-radius: 0; letter-spacing: 5px; text-transform: uppercase;
        }
        #startApp:hover { border-color: #0ff; color: #0ff; }
        
        .version-tag { margin-top: 25px; font-size: 0.7em; opacity: 0.5; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="splash">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">STAZIONE 03 | IDENTITÀ=CODICE</div>
        <h1 style="letter-spacing: 20px; font-weight: 100; margin-bottom: 5px;">BIOGEOMETRIE</h1>
        <div style="letter-spacing:4px;font-size:0.8em;opacity:0.6; margin-top: 10px; padding: 12px 18px;">Trasformazione algoritmica del volto in tempo reale</div>
        <button id="startApp">Tocca per avviare la mappatura</button>
        <div class="version-tag">BY DIEGO CAPANI</div>
    </div>

    <div id="ui">BIOGEOMETRIE // WEB-AR ENGINE</div>
    <video id="input_video" style="display:none;" playsinline></video>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
        import * as THREE from "https://cdn.skypack.dev/three@0.136.0";

        const splash = document.getElementById('splash');
        const startBtn = document.getElementById('startApp');

        async function startExperience() {
            splash.style.display = 'none';

            // Three.js Setup
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const material = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
            const mesh = new THREE.LineSegments(geometry, material);
            scene.add(mesh);
            camera.position.z = 1.5;

            // MediaPipe Setup
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            const video = document.getElementById("input_video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.play();

            function render() {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks.length > 0) {
                    const points = [];
                    // Estrazione landmark e normalizzazione
                    results.faceLandmarks[0].forEach(l => {
                        points.push(new THREE.Vector3(l.x * 2 - 1.2, -l.y * 2 + 1.2, -l.z * 5));
                    });
                    geometry.setFromPoints(points);
                }
                renderer.render(scene, camera);
                requestAnimationFrame(render);
            }
            video.onloadeddata = render;
        }

        startBtn.addEventListener('click', startExperience);
    </script>
</body>
</html>
