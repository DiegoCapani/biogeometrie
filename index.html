<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BIOGEOMETRIE | STAZIONE 03</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; font-family: monospace; }
    </style>
</head>
<body>
    <div id="ui">BIOGEOMETRIE // ALGORITHMIC IDENTITY</div>
    <video id="input_video" style="display:none;"></video>
    
    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
        import * as THREE from "https://cdn.skypack.dev/three@0.136.0";

        // Setup Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Geometria dinamica (Wireframe del volto)
        const geometry = new THREE.BufferGeometry();
        const material = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
        const mesh = new THREE.LineSegments(geometry, material);
        scene.add(mesh);
        camera.position.z = 2;

        // Inizializzazione MediaPipe
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
        const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
            runningMode: "VIDEO",
            numFaces: 1
        });

        const video = document.getElementById("input_video");
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.play();

        function render() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            if (results.faceLandmarks.length > 0) {
                // Mappatura dei landmark sulla geometria Three.js
                const points = results.faceLandmarks[0].map(l => new THREE.Vector3(l.x * 2 - 1, -l.y * 2 + 1, -l.z));
                geometry.setFromPoints(points);
            }
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }
        video.onloadeddata = render;
    </script>
</body>
</html>
