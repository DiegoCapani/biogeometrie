<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#03 BIOGEOMETRIE | Stazione 03</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Canvas */
        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        
        /* UI */
        #ui { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 10; color: #0ff; font-size: 9px; letter-spacing: 3px; pointer-events: none; }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            background: #000; color: white; text-align: center;
        }
        #startApp {
            margin-top: 30px; padding: 15px 35px; border: 1px solid #999;
            background: transparent; color: #fff; cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
        }
        #startApp:hover { border-color: #0ff; color: #0ff; }
        .version-tag { margin-top: 25px; font-size: 0.7em; opacity: 0.5; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="splash">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">STAZIONE 03 | CORPO=ARCHITETTURA</div>
        <h1 style="letter-spacing: 15px; font-weight: 100;">BIOGEOMETRIE</h1>
        <div style="letter-spacing:4px;font-size:0.8em;opacity:0.6; margin-top: 10px; padding: 12px 18px;">Mappatura algoritmica del corpo umano</div>
        <button id="startApp">Tocca per avviare</button>
        <div class="version-tag">BY DIEGO CAPANI</div>
    </div>

    <div id="ui">FULL BODY // ALGORITHMIC MAPPING</div>
    <video id="video" style="display:none" playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const splash = document.getElementById('splash');
        const video = document.getElementById('video');
        let poseLandmarker, scene, renderer, camera, pointsGeometry, pointsMesh;

        async function init() {
            splash.style.display = 'none';

            // 1. Setup Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 2;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. Setup MediaPipe
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task" },
                runningMode: "VIDEO"
            });

            // 3. Setup Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();

            // 4. Setup Oggetti
            pointsGeometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.05 });
            pointsMesh = new THREE.Points(pointsGeometry, material);
            scene.add(pointsMesh);

            render();
        }

        function render() {
            // Controllo video.readyState per evitare crash (ROI width/height error)
            if (video.readyState >= 2) {
                const results = poseLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    const pos = new Float32Array(results.landmarks[0].flatMap(l => [(l.x-0.5)*-2, (l.y-0.5)*-2, l.z]));
                    pointsGeometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        document.getElementById('startApp').addEventListener('click', init);
    </script>
</body>
</html>
