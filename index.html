<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#03 BIOGEOMETRIE | Volto Avanzato</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Canvas sopra tutto */
        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        
        /* UI */
        #ui { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 10; color: #0ff; font-size: 9px; letter-spacing: 3px; pointer-events: none; text-transform: uppercase;}

        /* Splash Screen (Stile Entropia) */
        #splash {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            background: #000; color: white; text-align: center;
        }
        #startApp {
            margin-top: 30px; padding: 15px 35px; border: 1px solid #999;
            background: transparent; color: #fff; cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
            transition: all 0.3s;
        }
        #startApp:hover { border-color: #0ff; color: #0ff; box-shadow: 0 0 15px rgba(0,255,255,0.5); }
        .version-tag { margin-top: 25px; font-size: 0.7em; opacity: 0.5; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="splash">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">STAZIONE 03 | IDENTITÀ=GEOMETRIA</div>
        <h1 style="letter-spacing: 15px; font-weight: 100; margin-bottom: 5px;">BIOGEOMETRIE</h1>
        <div style="letter-spacing:4px;font-size:0.8em;opacity:0.6; margin-top: 10px; padding: 12px 18px;">Scultura algoritmica del volto in tempo reale</div>
        <button id="startApp">Inizia Mappatura</button>
        <div class="version-tag">BY DIEGO CAPANI</div>
    </div>

    <div id="ui">FACE MESH // ALGORITHMIC IDENTITY</div>
    <video id="video" style="display:none" playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const splash = document.getElementById('splash');
        const video = document.getElementById('video');
        let faceLandmarker, scene, renderer, camera;
        let wireframeMesh, pointsMesh;

        // Indici per connettere i punti del Face Mesh di MediaPipe in linee (wireframe)
        // Questa è una lista parziale ma densa per creare l'estetica desiderata.
        const FACE_MESH_TESSELLATION = [
            10,338, 338,297, 297,332, 332,284, 284,251, 251,389, 389,356, 356,454, 454,323, 323,361, 361,288, 288,397, 397,365, 365,379, 379,378, 378,400, 400,377, 377,152, 152,148, 148,176, 176,149, 149,150, 150,136, 136,172, 172,58, 58,132, 132,93, 93,234, 234,127, 127,162, 162,21, 21,54, 54,103, 103,67, 67,109, 109,10, 
            103,66, 66,108, 108,69, 69,104, 104,103, 
            332,296, 296,337, 337,299, 299,333, 333,332, 
            // Aggiungi qui altri indici se desideri una rete ancora più fitta.
        ];

        async function init() {
            splash.style.display = 'none';

            // 1. Setup Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 10);
            camera.position.z = 0.5; // Molto vicino per il volto

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. Setup MediaPipe Face Landmarker
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            // 3. Setup Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.play();

            // 4. Setup Oggetti Geometrici (Wireframe e Punti)
            const geometry = new THREE.BufferGeometry();
            
            // Livello 1: Linee (Wireframe)
            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: 0x00ffff, 
                transparent: true, 
                opacity: 0.3 
            });
            wireframeMesh = new THREE.LineSegments(geometry, lineMaterial);
            scene.add(wireframeMesh);

            // Livello 2: Punti (Nodi)
            const pointMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.005, // Molto piccoli per il volto
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            pointsMesh = new THREE.Points(geometry, pointMaterial);
            scene.add(pointsMesh);

            render();
        }

        function render() {
            // Controllo state per evitare il crash
            if (video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const vertices = new Float32Array(landmarks.length * 3);
                    
                    // Mappatura coordinate 3D
                    for (let i = 0; i < landmarks.length; i++) {
                        vertices[i * 3]     = (landmarks[i].x - 0.5) * -1; // Inverti X per specchio
                        vertices[i * 3 + 1] = (landmarks[i].y - 0.5) * -1; // Inverti Y
                        vertices[i * 3 + 2] = -landmarks[i].z * 0.5; // Profondità (Z)
                    }

                    // Aggiorna la geometria comune
                    const geometry = wireframeMesh.geometry;
                    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                    
                    // Applica gli indici per le linee (tessellation) solo la prima volta
                    if (!geometry.index) {
                        geometry.setIndex(FACE_MESH_TESSELLATION);
                    }
                    
                    geometry.attributes.position.needsUpdate = true;
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        document.getElementById('startApp').addEventListener('click', init);
    </script>
</body>
</html>
