<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#03 BIOGEOMETRIE | DEBUG</title>
    <style>
        body { margin: 0; background: #000; }
        canvas { position: fixed; inset: 0; z-index: 2; }
        #input_video { position: fixed; top: 0; left: 0; width: 200px; z-index: 1; opacity: 0.5; } /* Video debug piccolo */
        #splash { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <h1>BIOGEOMETRIE</h1>
        <p>TOCCA PER AVVIARE E VERIFICARE IL TRACKING</p>
    </div>

    <video id="input_video" playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("input_video");
        let poseLandmarker, pointsGeometry, pointsMesh;

        async function start() {
            document.getElementById('splash').style.display = 'none';
            
            // Setup Three.js
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5; // Allontaniamo la camera per vedere meglio tutto il corpo
            
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Geometria
            pointsGeometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.2 });
            pointsMesh = new THREE.Points(pointsGeometry, material);
            scene.add(pointsMesh);

            // MediaPipe
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task` },
                runningMode: "VIDEO"
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();

            function render() {
                const results = poseLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    const pos = [];
                    results.landmarks[0].forEach(l => {
                        // Scaliamo in modo aggressivo per assicurarci di vedere i punti
                        pos.push((l.x - 0.5) * 6, -(l.y - 0.5) * 6, 0); 
                    });
                    pointsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
                }
                renderer.render(scene, camera);
                requestAnimationFrame(render);
            }
            render();
        }

        document.getElementById('splash').addEventListener('click', start);
    </script>
</body>
</html>
