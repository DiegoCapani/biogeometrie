<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#03 BIOGEOMETRIE | FULL BODY</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #canvas-container { position: fixed; inset: 0; z-index: 2; }
        #ui { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 10; color: #0ff; font-size: 9px; letter-spacing: 3px; pointer-events: none; }

        #splash {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            background: #000; color: white; text-align: center;
        }
        #startApp {
            margin-top: 30px; padding: 15px 35px; border: 1px solid #999;
            background: transparent; color: #fff; cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
        }
        #startApp:hover { border-color: #0ff; color: #0ff; }
        .version-tag { margin-top: 25px; font-size: 0.7em; opacity: 0.5; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="splash">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">STAZIONE 03 | CORPO=ARCHITETTURA</div>
        <h1 style="letter-spacing: 15px; font-weight: 100;">BIOGEOMETRIE</h1>
        <button id="startApp">Avvia Mappatura Totale</button>
        <div class="version-tag">BY DIEGO CAPANI</div>
    </div>

    <div id="ui">FULL BODY // ALGORITHMIC MAPPING</div>
    <video id="input_video" style="display:none;" playsinline></video>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("input_video");
        const splash = document.getElementById('splash');
        let poseLandmarker;
        let renderer, scene, camera, skeletonPoints;

        async function initApp() {
            // 1. Setup Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 2;
            
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 2. Setup MediaPipe
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                    delegate: "GPU" 
                },
                runningMode: "VIDEO"
            });

            // 3. Setup Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();
            
            // 4. Geometry
            const geometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.05 });
            skeletonPoints = new THREE.Points(geometry, material);
            scene.add(skeletonPoints);

            splash.style.display = 'none';
            render();
        }

        function render() {
            const results = poseLandmarker.detectForVideo(video, performance.now());
            if (results.landmarks.length > 0) {
                const points = [];
                results.landmarks[0].forEach(l => {
                    points.push(new THREE.Vector3((l.x - 0.5) * -2, (l.y - 0.5) * -2, l.z));
                });
                skeletonPoints.geometry.setFromPoints(points);
            }
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        document.getElementById('startApp').addEventListener('click', initApp);
    </script>
</body>
</html>
