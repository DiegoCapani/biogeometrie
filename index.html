<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BIOGEOMETRIE // STABILIZZAZIONE</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: monospace; }
        #status { position: fixed; top: 10px; left: 10px; z-index: 100; font-size: 12px; }
        #splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 999; cursor: pointer; border: 1px solid #0ff; }
    </style>
</head>
<body>

    <div id="status">STATO: IN ATTESA...</div>
    <div id="splash"><h1>TOCCA PER INIZIARE</h1></div>
    <video id="v" style="display:none" playsinline></video>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
        import * as THREE from "https://cdn.skypack.dev/three@0.136.0";

        const log = document.getElementById('status');
        const v = document.getElementById('v');

        async function init() {
            document.getElementById('splash').style.display = 'none';
            log.innerText = "Caricamento AI...";

            try {
                // Init Camera
                v.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
                v.play();

                // Init Three
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
                camera.position.z = 1;
                const renderer = new THREE.WebGLRenderer({ alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Geometria "AI Scan"
                const geo = new THREE.BufferGeometry();
                const mat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.01 });
                const pts = new THREE.Points(geo, mat);
                scene.add(pts);

                // Init MediaPipe
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                const landmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                    runningMode: "VIDEO"
                });

                function loop() {
                    if (v.readyState >= 2) {
                        const res = landmarker.detectForVideo(v, performance.now());
                        if (res.faceLandmarks.length > 0) {
                            const pos = new Float32Array(res.faceLandmarks[0].flatMap(l => [(l.x-0.5)*-2, (l.y-0.5)*-2, l.z]));
                            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                            log.innerText = "STATUS: TRACKING ATTIVO";
                        }
                    }
                    renderer.render(scene, camera);
                    requestAnimationFrame(loop);
                }
                loop();
            } catch(e) {
                log.innerText = "ERRORE: " + e.message;
            }
        }
        document.getElementById('splash').onclick = init;
    </script>
</body>
</html>
