<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIOGEOMETRIE | AI PERCEPTION</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; background: #000; color: #fff; }
        #startApp { margin-top: 30px; padding: 15px 35px; border: 1px solid #0ff; background: transparent; color: #0ff; cursor: pointer; letter-spacing: 5px; text-transform: uppercase; }
        .version-tag { margin-top: 25px; font-size: 0.7em; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="letter-spacing: 15px;">BIOGEOMETRIE</h1>
        <p style="opacity: 0.6;">ANALISI DATI BIOMETRICI IN CORSO...</p>
        <button id="startApp">SINCRONIZZA IDENTITÀ</button>
        <div class="version-tag">STAZIONE 03 // AI VISION</div>
    </div>

    <video id="input_video" style="display:none;" playsinline></video>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";
        import * as THREE from "https://cdn.skypack.dev/three@0.136.0";
        import { EffectComposer } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js";
        import { RenderPass } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js";
        import { UnrealBloomPass } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js";

        const startBtn = document.getElementById('startApp');

        async function startExperience() {
            document.getElementById('splash').style.display = 'none';

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Post-Processing: Il trucco per l'effetto AI/Neon
            const composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloomPass);

            const geometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.02 });
            const pointsMesh = new THREE.Points(geometry, material);
            scene.add(pointsMesh);
            camera.position.z = 1.2;

            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            const video = document.getElementById("input_video");
            video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
            video.play();

            function render() {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks.length > 0) {
                    const points = [];
                    results.faceLandmarks[0].forEach((l, i) => {
                        // Aggiungiamo un leggero "jitter" (rumore) digitale
                        const jitter = Math.sin(performance.now() * 0.01 + i) * 0.002;
                        points.push(new THREE.Vector3(l.x * 2 - 1 + jitter, -l.y * 2 + 1 + jitter, -l.z * 2));
                    });
                    geometry.setFromPoints(points);
                }
                composer.render();
                requestAnimationFrame(render);
            }
            video.onloadeddata = render;
        }
        startBtn.addEventListener('click', startExperience);
    </script>
</body>
</html>
